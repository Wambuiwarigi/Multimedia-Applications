<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Audio Control Interface</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Nunito:wght@300;400;500;600;700&display=swap');

  :root {
    --bg:       #fdf8f8;
    --surface:  #ffffff;
    --panel:    #fef0f4;
    --border:   #f2dde4;
    --accent:   #e8789a;
    --accent2:  #b78fd6;
    --peach:    #f4a88a;
    --text:     #4a3040;
    --muted:    #b8a0ac;
    --danger:   #e87878;
    --r:        14px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image: radial-gradient(circle, #f2c8d8 1px, transparent 1px);
    background-size: 28px 28px;
    opacity: 0.35;
  }

  body::after {
    content: '';
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background:
      radial-gradient(ellipse 420px 320px at 10% 15%, #fde8f0 0%, transparent 70%),
      radial-gradient(ellipse 380px 280px at 90% 80%, #ede0f8 0%, transparent 70%),
      radial-gradient(ellipse 300px 240px at 60% 10%, #fde8dc 0%, transparent 70%);
  }

  .page {
    position: relative; z-index: 1;
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 2rem 1rem; gap: 0;
  }

  .hdr {
    width: 100%; max-width: 620px;
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 1.25rem;
  }
  .hdr-title {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(1.4rem, 4vw, 2rem);
    font-weight: 400;
    color: var(--text);
    letter-spacing: 0.01em;
  }
  .hdr-title span { color: var(--accent); font-style: italic; }
  .kbd-hint {
    font-size: 11px; color: var(--muted);
    letter-spacing: 0.04em; font-weight: 500;
  }

  .vis-wrap {
    width: 100%; max-width: 620px; height: 88px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    overflow: hidden; margin-bottom: 1rem; position: relative;
    box-shadow: 0 2px 20px rgba(232,120,154,0.08);
  }
  #vis-canvas { display: block; width: 100%; height: 100%; }
  .vis-idle {
    position: absolute; inset: 0; display: flex; align-items: center;
    justify-content: center; font-size: 12px; color: var(--muted);
    letter-spacing: 0.12em; text-transform: uppercase; pointer-events: none;
    font-weight: 500;
  }

  .card {
    width: 100%; max-width: 620px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 4px 32px rgba(183,143,214,0.1), 0 1px 4px rgba(232,120,154,0.06);
  }

  .file-zone {
    padding: 1.25rem 1.5rem;
    border-bottom: 1.5px solid var(--border);
    display: flex; align-items: center; gap: 14px;
    background: linear-gradient(135deg, #fff9fb 0%, #fdf5ff 100%);
  }
  .file-btn {
    flex-shrink: 0;
    font-family: 'Nunito', sans-serif;
    font-size: 12px; font-weight: 700;
    padding: 8px 18px;
    border-radius: 50px;
    border: 1.5px solid var(--accent);
    background: var(--panel);
    color: var(--accent);
    cursor: pointer;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    transition: background 0.18s, color 0.18s, transform 0.1s;
  }
  .file-btn:hover { background: var(--accent); color: #fff; transform: scale(1.03); }
  .file-info { flex: 1; overflow: hidden; }
  .file-name {
    font-size: 14px; font-weight: 700; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .file-meta { font-size: 11px; color: var(--muted); margin-top: 2px; font-weight: 500; }

  .prog-zone {
    padding: 1rem 1.5rem 0.6rem;
    border-bottom: 1.5px solid var(--border);
    background: #fff;
  }
  .prog-track {
    position: relative; height: 5px;
    background: var(--panel);
    border-radius: 99px;
    cursor: pointer; margin-bottom: 8px;
  }
  .prog-fill {
    position: absolute; left: 0; top: 0; bottom: 0;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 99px; width: 0%;
    transition: width 0.1s linear; pointer-events: none;
  }
  .prog-thumb {
    position: absolute; top: 50%; left: 0%;
    width: 14px; height: 14px; border-radius: 50%;
    background: var(--accent);
    border: 2px solid #fff;
    box-shadow: 0 0 0 2px var(--accent);
    transform: translate(-50%, -50%);
    transition: left 0.1s linear; opacity: 0; pointer-events: none;
  }
  .prog-track:hover .prog-thumb { opacity: 1; }
  .time-row { display: flex; justify-content: space-between; align-items: center; }
  .time-el { font-size: 11px; color: var(--muted); font-family: 'Nunito', sans-serif; font-weight: 600; }
  .time-el.current { color: var(--accent); font-size: 14px; font-weight: 700; }

 
  .ctrl-zone {
    padding: 1.1rem 1.5rem;
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; border-bottom: 1.5px solid var(--border);
    flex-wrap: wrap;
    background: #fff;
  }
  .ctrl-group { display: flex; align-items: center; gap: 10px; }

  .btn {
    font-family: 'Nunito', sans-serif;
    border: 1.5px solid var(--border);
    background: var(--panel);
    color: var(--text);
    cursor: pointer;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    transition: border-color 0.18s, background 0.18s, color 0.18s, transform 0.1s;
    line-height: 1;
  }
  .btn:active { transform: scale(0.93); }
  .btn.sm { width: 36px; height: 36px; }
  .btn.lg { width: 58px; height: 58px; border-radius: 50%; }
  .btn:hover { border-color: var(--accent); color: var(--accent); background: #fff0f4; }
  .btn.active {
    border-color: var(--accent2); color: var(--accent2);
    background: #f5eeff;
  }
  .btn.play-btn {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff; border: none;
    box-shadow: 0 4px 18px rgba(232,120,154,0.35);
  }
  .btn.play-btn:hover { box-shadow: 0 6px 22px rgba(232,120,154,0.45); transform: scale(1.05); }

  .btn-wrap { display: flex; flex-direction: column; align-items: center; }
  .btn-label {
    font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase;
    color: var(--muted); margin-top: 5px; text-align: center; font-weight: 600;
  }

 
  .sec-zone {
    padding: 1rem 1.5rem;
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1.25rem;
    border-bottom: 1.5px solid var(--border);
    background: linear-gradient(180deg, #fff 0%, #fdf8fc 100%);
  }
  .knob-group { display: flex; flex-direction: column; gap: 7px; }
  .knob-label {
    font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--muted); display: flex; justify-content: space-between;
    font-weight: 700;
  }
  .knob-label span { color: var(--accent2); }

  input[type=range] {
    -webkit-appearance: none; appearance: none;
    width: 100%; height: 4px; border-radius: 99px;
    background: var(--panel); outline: none; cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 15px; height: 15px;
    border-radius: 50%; background: var(--accent2);
    border: 2.5px solid #fff;
    box-shadow: 0 0 0 1.5px var(--accent2);
    cursor: pointer;
  }
  input[type=range]::-moz-range-thumb {
    width: 15px; height: 15px; border-radius: 50%;
    background: var(--accent2); border: 2.5px solid #fff;
    cursor: pointer;
  }
  input[type=range].vol-range::-webkit-slider-thumb { background: var(--accent); box-shadow: 0 0 0 1.5px var(--accent); }
  input[type=range].vol-range::-moz-range-thumb     { background: var(--accent); }
  input[type=range].spd-range::-webkit-slider-thumb { background: var(--peach); box-shadow: 0 0 0 1.5px var(--peach); }
  input[type=range].spd-range::-moz-range-thumb     { background: var(--peach); }

  .status-bar {
    padding: 0.6rem 1.5rem;
    display: flex; align-items: center; justify-content: space-between;
    font-size: 11px; letter-spacing: 0.06em; color: var(--muted);
    text-transform: uppercase; font-weight: 600;
    background: linear-gradient(135deg, #fff9fb 0%, #fdf5ff 100%);
  }
  .status-dot {
    display: inline-block; width: 7px; height: 7px; border-radius: 50%;
    background: var(--border); margin-right: 7px; vertical-align: middle;
    transition: background 0.25s;
  }
  .status-dot.playing { background: var(--accent); box-shadow: 0 0 0 3px rgba(232,120,154,0.2); }
  .status-dot.muted   { background: var(--danger); }

  .keys-panel {
    width: 100%; max-width: 620px; margin-top: 1rem;
    padding: 0.8rem 1.1rem;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    display: flex; flex-wrap: wrap; gap: 8px 18px;
    box-shadow: 0 2px 12px rgba(183,143,214,0.07);
  }
  .key-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); font-weight: 500; }
  .key {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 24px; height: 20px;
    border: 1.5px solid var(--border); border-radius: 6px;
    font-size: 10px; font-weight: 700; color: var(--text);
    padding: 0 5px; background: var(--panel);
  }

  .toast {
    position: fixed; bottom: 1.5rem; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 50px;
    padding: 9px 20px; font-size: 12px; color: var(--text);
    letter-spacing: 0.04em; font-weight: 600;
    opacity: 0; pointer-events: none;
    transition: opacity 0.22s, transform 0.22s;
    z-index: 99; white-space: nowrap;
    box-shadow: 0 4px 20px rgba(232,120,154,0.15);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="page">

  <div class="hdr">
    <div class="hdr-title">Sound<span>.</span>API</div>
    <div class="kbd-hint">Monday 20th April Class Assignment</div>
  </div>

  <div class="vis-wrap">
    <canvas id="vis-canvas"></canvas>
    <div class="vis-idle" id="vis-idle">load an audio file to begin</div>
  </div>

  <div class="card">

    <div class="file-zone">
      <button class="file-btn" onclick="document.getElementById('file-in').click()">load file</button>
      <input type="file" id="file-in" accept="audio/*" style="display:none" onchange="loadFile(this)"/>
      <div class="file-info">
        <div class="file-name" id="file-name">No file selected</div>
        <div class="file-meta" id="file-meta">Choose an audio file above</div>
      </div>
    </div>

    <div class="prog-zone">
      <div class="prog-track" id="prog-track">
        <div class="prog-fill"  id="prog-fill"></div>
        <div class="prog-thumb" id="prog-thumb"></div>
      </div>
      <div class="time-row">
        <span class="time-el current" id="t-cur">0:00.0</span>
        <span class="time-el" id="t-dur">0:00</span>
      </div>
    </div>

    
    <div class="ctrl-zone">
      <div class="ctrl-group">
        <div class="btn-wrap">
          <button class="btn sm" onclick="skip(-10)" title="Skip back 10s">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M3 3v10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
              <path d="M13 8L6 4v8z" fill="currentColor"/>
            </svg>
          </button>
          <div class="btn-label">−10s</div>
        </div>

        <div class="btn-wrap">
          <button class="btn lg play-btn" id="btn-play" onclick="togglePlay()">
            <svg id="ico-play" width="22" height="22" viewBox="0 0 22 22" fill="none">
              <path d="M7 4.5L18 11 7 17.5V4.5Z" fill="currentColor"/>
            </svg>
            <svg id="ico-pause" width="22" height="22" viewBox="0 0 22 22" fill="none" style="display:none">
              <rect x="5" y="4" width="4" height="14" rx="1.5" fill="currentColor"/>
              <rect x="13" y="4" width="4" height="14" rx="1.5" fill="currentColor"/>
            </svg>
          </button>
          <div class="btn-label" id="play-label">play</div>
        </div>

        <div class="btn-wrap">
          <button class="btn sm" onclick="skip(10)" title="Skip forward 10s">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M13 3v10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
              <path d="M3 8l7-4v8z" fill="currentColor"/>
            </svg>
          </button>
          <div class="btn-label">+10s</div>
        </div>
      </div>

      <div class="ctrl-group">
        <div class="btn-wrap">
          <button class="btn sm" id="btn-mute" onclick="toggleMute()">
            <svg id="ico-vol" width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M3 6h2l3-3v10L5 10H3a1 1 0 01-1-1V7a1 1 0 011-1z" fill="currentColor"/>
              <path d="M11 5.5c1 .8 1.5 1.6 1.5 2.5s-.5 1.7-1.5 2.5M12.5 3.5c1.5 1.2 2.5 2.7 2.5 4.5s-1 3.3-2.5 4.5"
                stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
            </svg>
            <svg id="ico-mute" width="16" height="16" viewBox="0 0 16 16" fill="none" style="display:none">
              <path d="M3 6h2l3-3v10L5 10H3a1 1 0 01-1-1V7a1 1 0 011-1z" fill="currentColor"/>
              <path d="M11 6l3 4M14 6l-3 4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            </svg>
          </button>
          <div class="btn-label">mute</div>
        </div>

        <div class="btn-wrap">
          <button class="btn sm" id="btn-loop" onclick="toggleLoop()">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M2 8A6 6 0 0114 8M14 8A6 6 0 012 8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
              <path d="M12 5.5l2 2.5-2 2.5M4 10.5L2 8 4 5.5" stroke="currentColor" stroke-width="1.3"
                stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <div class="btn-label">loop</div>
        </div>
      </div>
    </div>

    
    <div class="sec-zone">
      <div class="knob-group">
        <div class="knob-label">Volume <span id="vol-val">100%</span></div>
        <input type="range" class="vol-range" id="vol-slider"
               min="0" max="1" step="0.01" value="1" oninput="setVolume(this.value)"/>
      </div>
      <div class="knob-group">
        <div class="knob-label">Speed <span id="spd-val">1.0×</span></div>
        <input type="range" class="spd-range" id="spd-slider"
               min="0.5" max="2" step="0.1" value="1" oninput="setSpeed(this.value)"/>
      </div>
      <div class="knob-group">
        <div class="knob-label">Progress <span id="pct-val">0%</span></div>
        <input type="range" id="pct-bar" min="0" max="100" step="0.1" value="0"
               style="pointer-events:none;opacity:0.45"/>
      </div>
    </div>

    
    <div class="status-bar">
      <div><span class="status-dot" id="status-dot"></span><span id="status-txt">idle</span></div>
      <div id="status-right">no file loaded</div>
    </div>

  </div>

  
  <div class="keys-panel">
    <div class="key-item"><kbd class="key">Space</kbd> play / pause</div>
    <div class="key-item"><kbd class="key">M</kbd> mute</div>
    <div class="key-item"><kbd class="key">L</kbd> loop</div>
    <div class="key-item"><kbd class="key">&#8592;</kbd> −10s</div>
    <div class="key-item"><kbd class="key">&#8594;</kbd> +10s</div>
    <div class="key-item"><kbd class="key">&#8593;</kbd> vol +</div>
    <div class="key-item"><kbd class="key">&#8595;</kbd> vol −</div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const audio = new Audio();
let muted = false, looping = false, loaded = false;
let audioCtx = null, analyser = null, dataArr = null;

function fmt(s, d) {
  if (isNaN(s) || s < 0) s = 0;
  const m = Math.floor(s / 60), sec = (s % 60).toFixed(d || 0);
  return m + ':' + String(sec).padStart(d ? 4 : 2, '0');
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(el._t); el._t = setTimeout(() => el.classList.remove('show'), 1600);
}

function loadFile(inp) {
  const f = inp.files[0]; if (!f) return;
  audio.src = URL.createObjectURL(f); audio.load(); loaded = true;
  document.getElementById('file-name').textContent = f.name.replace(/\.[^.]+$/, '');
  document.getElementById('file-meta').textContent = f.type + ' · ' + (f.size/1048576).toFixed(2) + ' MB';
  document.getElementById('vis-idle').style.display = 'none';
  document.getElementById('status-right').textContent = f.name;
  initAnalyser(); toast('file loaded — press Space to play');
}

function initAnalyser() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = audioCtx.createAnalyser(); analyser.fftSize = 128;
  dataArr = new Uint8Array(analyser.frequencyBinCount);
  const src = audioCtx.createMediaElementSource(audio);
  src.connect(analyser); analyser.connect(audioCtx.destination);
}

const canvas = document.getElementById('vis-canvas');
const ctx2d  = canvas.getContext('2d');

(function draw() {
  requestAnimationFrame(draw);
  const W = canvas.offsetWidth, H = canvas.offsetHeight;
  if (canvas.width !== W)  canvas.width  = W;
  if (canvas.height !== H) canvas.height = H;
  ctx2d.clearRect(0, 0, W, H);
  if (!analyser) { drawIdle(W, H); return; }
  analyser.getByteFrequencyData(dataArr);
  const n = dataArr.length, bW = W / n - 1;
  const colors = ['#e8789a','#c98fd4','#f4a88a','#b78fd6','#f0a0b8'];
  for (let i = 0; i < n; i++) {
    const v = dataArr[i] / 255, bH = v * H * 0.88;
    ctx2d.fillStyle = colors[i % colors.length];
    ctx2d.globalAlpha = 0.55 + v * 0.45;
    const x = i * (bW + 1);
    const br = Math.min(bW / 2, 4);
    ctx2d.beginPath();
    ctx2d.roundRect(x, H - bH, bW, bH, [br, br, 0, 0]);
    ctx2d.fill();
  }
  ctx2d.globalAlpha = 1;
})();

function drawIdle(W, H) {
  const t = Date.now() / 1000;
  ctx2d.strokeStyle = '#f2dde4'; ctx2d.lineWidth = 2;
  ctx2d.beginPath();
  for (let x = 0; x <= W; x += 2) {
    const y = H/2 + Math.sin((x/W)*Math.PI*5 + t*1.5)*10*Math.sin(t*0.4);
    x === 0 ? ctx2d.moveTo(x,y) : ctx2d.lineTo(x,y);
  }
  ctx2d.stroke();
}

function togglePlay() {
  if (!loaded) { toast('load a file first'); return; }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  audio.paused ? audio.play() : audio.pause();
}

function skip(d) {
  if (!loaded) return;
  audio.currentTime = Math.max(0, Math.min(audio.duration||0, audio.currentTime+d));
  toast((d>0?'+':'')+d+'s');
}

function setVolume(v) {
  v = parseFloat(v); audio.volume = v;
  document.getElementById('vol-val').textContent = Math.round(v*100)+'%';
  if (v === 0) { muted=true; audio.muted=true; showMuteIcon(true); }
  else if (muted) { muted=false; audio.muted=false; showMuteIcon(false); }
  updateStatus();
}

function toggleMute() {
  muted = !muted; audio.muted = muted;
  showMuteIcon(muted);
  document.getElementById('btn-mute').classList.toggle('active', muted);
  toast(muted ? 'muted' : 'unmuted'); updateStatus();
}

function showMuteIcon(m) {
  document.getElementById('ico-vol').style.display  = m ? 'none' : '';
  document.getElementById('ico-mute').style.display = m ? '' : 'none';
}

function toggleLoop() {
  looping = !looping; audio.loop = looping;
  document.getElementById('btn-loop').classList.toggle('active', looping);
  toast(looping ? 'loop on' : 'loop off');
}

function setSpeed(v) {
  v = parseFloat(v); audio.playbackRate = v;
  document.getElementById('spd-val').textContent = v.toFixed(1)+'×';
}

function updateStatus() {
  const dot = document.getElementById('status-dot'), txt = document.getElementById('status-txt');
  if (!loaded)       { dot.className='status-dot'; txt.textContent='idle'; return; }
  if (muted)         { dot.className='status-dot muted'; txt.textContent='muted'; return; }
  if (!audio.paused) { dot.className='status-dot playing'; txt.textContent='playing'; return; }
  dot.className='status-dot'; txt.textContent='paused';
}

document.getElementById('prog-track').addEventListener('click', function(e) {
  if (!audio.duration) return;
  const r = this.getBoundingClientRect();
  audio.currentTime = ((e.clientX - r.left) / r.width) * audio.duration;
});

audio.addEventListener('play', () => {
  document.getElementById('ico-play').style.display='none';
  document.getElementById('ico-pause').style.display='';
  document.getElementById('play-label').textContent='pause';
  updateStatus();
});
audio.addEventListener('pause', () => {
  document.getElementById('ico-play').style.display='';
  document.getElementById('ico-pause').style.display='none';
  document.getElementById('play-label').textContent='play';
  updateStatus();
});
audio.addEventListener('ended', () => { updateStatus(); });
audio.addEventListener('timeupdate', () => {
  const pct = audio.duration ? (audio.currentTime/audio.duration)*100 : 0;
  document.getElementById('prog-fill').style.width  = pct.toFixed(3)+'%';
  document.getElementById('prog-thumb').style.left  = pct.toFixed(3)+'%';
  document.getElementById('t-cur').textContent      = fmt(audio.currentTime, 1);
  document.getElementById('pct-val').textContent    = pct.toFixed(1)+'%';
  document.getElementById('pct-bar').value          = pct;
});
audio.addEventListener('durationchange', () => {
  document.getElementById('t-dur').textContent = fmt(audio.duration);
});

document.addEventListener('keydown', function(e) {
  if (['INPUT','TEXTAREA'].includes(document.activeElement.tagName)) return;
  const vs = document.getElementById('vol-slider');
  switch(e.key) {
    case ' ':          e.preventDefault(); togglePlay(); break;
    case 'ArrowLeft':  e.preventDefault(); skip(-10); break;
    case 'ArrowRight': e.preventDefault(); skip(10); break;
    case 'ArrowUp':
      e.preventDefault();
      vs.value = Math.min(1, parseFloat(vs.value)+0.05).toFixed(2);
      setVolume(vs.value); break;
    case 'ArrowDown':
      e.preventDefault();
      vs.value = Math.max(0, parseFloat(vs.value)-0.05).toFixed(2);
      setVolume(vs.value); break;
    case 'm': case 'M': toggleMute(); break;
    case 'l': case 'L': toggleLoop(); break;
  }
});
</script>
</body>
</html>
